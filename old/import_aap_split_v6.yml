---
- name: Backup do AAP 2.4 e Push para o GitHub
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    github_token: "{{ secret_github_token }}"
    github_repo_url: "github.com/laurobmb/aap_backup.git"
    github_branch: "aap24-platform-baseline"
    repo_dir: "/tmp/aap_backup_repo"
    backup_dir: "{{ repo_dir }}/export_granular"

  tasks:
    - name: Limpar diretório temporário (Idempotência no container)
      ansible.builtin.file:
        path: "{{ repo_dir }}"
        state: absent

    - name: Clonar o repositório e preparar a branch
      ansible.builtin.shell: |
        git clone https://{{ github_token }}@{{ github_repo_url }} {{ repo_dir }}
        cd {{ repo_dir }}
        git checkout -B {{ github_branch }}
      no_log: true # Esconde a saída para não vazar o token no log do Job!

    - name: Garantir que a pasta de backup exista dentro do repo
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    - name: Exportar recursos do AAP
      ansible.controller.export:
        organizations: "{{ 'all' if item == 'organizations' else omit }}"
        users: "{{ 'all' if item == 'users' else omit }}"
        credential_types: "{{ 'all' if item == 'credential_types' else omit }}"
        execution_environments: "{{ 'all' if item == 'execution_environments' else omit }}"
        teams: "{{ 'all' if item == 'teams' else omit }}"
        credentials: "{{ 'all' if item == 'credentials' else omit }}"
        projects: "{{ 'all' if item == 'projects' else omit }}"
        inventory: "{{ 'all' if item == 'inventory' else omit }}"
        inventory_sources: "{{ 'all' if item == 'inventory_sources' else omit }}"
        notification_templates: "{{ 'all' if item == 'notification_templates' else omit }}"
        applications: "{{ 'all' if item == 'applications' else omit }}"
        job_templates: "{{ 'all' if item == 'job_templates' else omit }}"
        workflow_job_templates: "{{ 'all' if item == 'workflow_job_templates' else omit }}"
        schedules: "{{ 'all' if item == 'schedules' else omit }}"
      loop:
        - organizations
        - users
        - credential_types
        - execution_environments
        - teams
        - credentials
        - projects
        - inventory
        - inventory_sources
        - notification_templates
        - applications
        - job_templates
        - workflow_job_templates
        - schedules
      register: aap_exports

    - name: Salvar recursos em arquivos YAML no repositório
      ansible.builtin.copy:
        content: "{{ item.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/{{ '%02d' % (index + 1) }}_{{ item.item }}.yml"
        mode: '0644'
      loop: "{{ aap_exports.results }}"
      loop_control:
        index_var: index

    - name: Configurar identidade do Git, fazer Commit e Push
      ansible.builtin.shell: |
        cd {{ repo_dir }}
        # Configurações de autoria do commit
        git config user.name "AAP Automation (CaC)"
        git config user.email "cac-automation@rhbr-lab.com"
        # Adiciona os arquivos
        git add .
        # Verifica se há mudanças. Se houver, faz o commit e push.
        if ! git diff-index --quiet HEAD; then
          git commit -m "Backup baseline do AAP 2.4 - $(date +'%Y-%m-%d %H:%M:%S')"
          git push -u origin {{ github_branch }}
          echo "Mudanças enviadas com sucesso!"
        else
          echo "Nenhuma alteração detectada nas configurações. Push ignorado."
        fi
      register: git_result
      changed_when: "'Mudanças enviadas com sucesso' in git_result.stdout"

    - name: Resumo da Execução
      ansible.builtin.debug:
        msg: "Processo concluído! Verifique a branch {{ github_branch }} no repositório."
