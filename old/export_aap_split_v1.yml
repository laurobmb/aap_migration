---
- name: Backup Granular do AAP (Item a Item)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Pasta base mapeada no seu ansible-navigator.yml
    backup_dir: "/tmp/backup_aap/export_granular"

  tasks:
    - name: Garantir que o diretório de backup exista
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    # ==========================================
    # NÍVEL 0: A BASE
    # ==========================================
    - name: Exportar Organizations
      ansible.controller.export:
        organizations: 'all'
      register: exp_organizations

    - name: Salvar Organizations
      ansible.builtin.copy:
        content: "{{ exp_organizations.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/01_organizations.yml"
        mode: '0644'

    - name: Exportar Users
      ansible.controller.export:
        users: 'all'
      register: exp_users

    - name: Salvar Users
      ansible.builtin.copy:
        content: "{{ exp_users.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/02_users.yml"
        mode: '0644'

    - name: Exportar Credential Types
      ansible.controller.export:
        credential_types: 'all'
      register: exp_credential_types

    - name: Salvar Credential Types
      ansible.builtin.copy:
        content: "{{ exp_credential_types.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/03_credential_types.yml"
        mode: '0644'

    - name: Exportar Execution Environments
      ansible.controller.export:
        execution_environments: 'all'
      register: exp_execution_environments

    - name: Salvar Execution Environments
      ansible.builtin.copy:
        content: "{{ exp_execution_environments.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/04_execution_environments.yml"
        mode: '0644'

    # ==========================================
    # NÍVEL 1: ACESSOS E INSUMOS
    # ==========================================
    - name: Exportar Teams
      ansible.controller.export:
        teams: 'all'
      register: exp_teams

    - name: Salvar Teams
      ansible.builtin.copy:
        content: "{{ exp_teams.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/05_teams.yml"
        mode: '0644'

    - name: Exportar Credentials
      ansible.controller.export:
        credentials: 'all'
      register: exp_credentials

    - name: Salvar Credentials
      ansible.builtin.copy:
        content: "{{ exp_credentials.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/06_credentials.yml"
        mode: '0644'

    - name: Exportar Projects
      ansible.controller.export:
        projects: 'all'
      register: exp_projects

    - name: Salvar Projects
      ansible.builtin.copy:
        content: "{{ exp_projects.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/07_projects.yml"
        mode: '0644'

    - name: Exportar Inventories
      ansible.controller.export:
        inventory: 'all' # A documentação pede no singular aqui
      register: exp_inventory

    - name: Salvar Inventories
      ansible.builtin.copy:
        content: "{{ exp_inventory.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/08_inventories.yml"
        mode: '0644'

    - name: Exportar Inventory Sources
      ansible.controller.export:
        inventory_sources: 'all'
      register: exp_inventory_sources

    - name: Salvar Inventory Sources
      ansible.builtin.copy:
        content: "{{ exp_inventory_sources.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/09_inventory_sources.yml"
        mode: '0644'

    # ==========================================
    # NÍVEL 2: NOTIFICAÇÕES E APLICAÇÕES
    # ==========================================
    - name: Exportar Notification Templates
      ansible.controller.export:
        notification_templates: 'all'
      register: exp_notification_templates

    - name: Salvar Notification Templates
      ansible.builtin.copy:
        content: "{{ exp_notification_templates.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/10_notification_templates.yml"
        mode: '0644'

    - name: Exportar Applications (OAuth2)
      ansible.controller.export:
        applications: 'all'
      register: exp_applications

    - name: Salvar Applications
      ansible.builtin.copy:
        content: "{{ exp_applications.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/11_applications.yml"
        mode: '0644'

    # ==========================================
    # NÍVEL 3: O TOPO (TEMPLATES E SCHEDULES)
    # ==========================================
    - name: Exportar Job Templates
      ansible.controller.export:
        job_templates: 'all'
      register: exp_job_templates

    - name: Salvar Job Templates
      ansible.builtin.copy:
        content: "{{ exp_job_templates.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/12_job_templates.yml"
        mode: '0644'

    - name: Exportar Workflow Job Templates
      ansible.controller.export:
        workflow_job_templates: 'all'
      register: exp_workflow_job_templates

    - name: Salvar Workflow Job Templates
      ansible.builtin.copy:
        content: "{{ exp_workflow_job_templates.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/13_workflow_job_templates.yml"
        mode: '0644'

    - name: Exportar Schedules
      ansible.controller.export:
        schedules: 'all'
      register: exp_schedules

    - name: Salvar Schedules
      ansible.builtin.copy:
        content: "{{ exp_schedules.assets | to_nice_yaml }}"
        dest: "{{ backup_dir }}/14_schedules.yml"
        mode: '0644'

    # ==========================================
    # FINALIZAÇÃO
    # ==========================================
    - name: Resumo da Execução
      ansible.builtin.debug:
        msg: "Exportação granular concluída! Verifique a pasta {{ backup_dir }} no seu host local."

