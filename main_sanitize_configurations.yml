---
- name: GitOps - Sanitizar current_settings.yaml no GitHub
  hosts: localhost
  gather_facts: false

  vars:
    # Configurações do Git
    github_token: "{{ github_token }}"
    github_repo_url: "github.com/laurobmb/aap_backup.git"
    github_branch: "aap24-platform-baseline"

    # Diretório temporário
    repo_dir: "/tmp/settings_parser"
    settings_file: "{{ repo_dir }}/current_settings.yaml"

  pre_tasks:
    - name: Limpar diretório temporário
      ansible.builtin.file:
        path: "{{ repo_dir }}"
        state: absent

    - name: Clonar o repositório do GitHub
      ansible.builtin.shell: |
        git clone https://{{ github_token }}@{{ github_repo_url }} -b {{ github_branch }} {{ repo_dir }}
      # no_log: true

  tasks:
    - name: Verificar se o arquivo current_settings.yaml existe
      ansible.builtin.stat:
        path: "{{ settings_file }}"
      register: file_stat

    - name: Bloco de Sanitização do YAML
      when: file_stat.stat.exists
      block:
        - name: Ler o conteúdo original do current_settings.yaml
          ansible.builtin.slurp:
            src: "{{ settings_file }}"
          register: slurp_settings

        - name: Corrigir sintaxe quebrada e converter para Dicionário
          ansible.builtin.set_fact:
            # 1. Decodifica o Base64
            # 2. Remove o !unsafe
            # 3. A MÁGICA: Esvazia a linha que tem as aspas quebradas para não dar ParserError
            # 4. Só então converte para YAML
            parsed_yaml: >-
              {{
                (slurp_settings.content | b64decode)
                | regex_replace('!unsafe ', '')
                | regex_replace('AUTOMATION_ANALYTICS_LAST_ENTRIES:.*', 'AUTOMATION_ANALYTICS_LAST_ENTRIES: "{}"')
                | from_yaml
              }}

        - name: Sanitizar as configurações globais (Remover itens atrelados ao Servidor e Senhas)
          ansible.builtin.set_fact:
            sanitized_settings: >-
              {{
                parsed_yaml.controller_settings[0].settings
                | dict2items
                | rejectattr('key', 'in', [
                    'LICENSE', 
                    'INSTALL_UUID', 
                    'AUTOMATION_ANALYTICS_LAST_ENTRIES', 
                    'AUTOMATION_ANALYTICS_LAST_GATHER',
                    'CLEANUP_HOST_METRICS_LAST_TS',
                    'HOST_METRIC_SUMMARY_TASK_LAST_TS',
                    'INSIGHTS_TRACKING_STATE',
                    'PENDO_TRACKING_STATE',
                    'REDHAT_USERNAME',
                    'TOWER_URL_BASE',
                    'CUSTOM_LOGO',
                    'CUSTOM_LOGIN_INFO'
                  ])
                | rejectattr('value', 'equalto', '$encrypted$')
                | items2dict
              }}

        - name: Reconstruir a estrutura original do controller_settings
          ansible.builtin.set_fact:
            final_yaml:
              controller_settings:
                - settings: "{{ sanitized_settings }}"

        - name: Sobrescrever o current_settings.yaml com a versão limpa
          ansible.builtin.copy:
            # Aqui nós concatenamos o '---' com o conteúdo convertido
            content: "---\n{{ final_yaml | to_nice_yaml(indent=2, width=1337) }}"
            dest: "{{ settings_file }}"
            mode: '0644'

  post_tasks:
    - name: Configurar identidade do Git, fazer Commit e Push
      when: file_stat.stat.exists
      ansible.builtin.shell: |
        set -e
        cd {{ repo_dir }}

        git config user.name "AAP Automation (CaC)"
        git config user.email "cac-automation@rhbr-lab.com"
        git add current_settings.yaml

        if ! git diff-index --quiet HEAD; then
          git commit -m "Update: Sanitização do current_settings.yaml (Remoção de bloqueios da API) - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin {{ github_branch }}
          echo "STATUS: SUCESSO_PUSH"
        else
          echo "STATUS: SEM_MUDANCAS"
        fi
      register: git_result
      changed_when: "'SUCESSO_PUSH' in git_result.stdout | default('')"

    - name: Limpar diretório temporário final
      ansible.builtin.file:
        path: "{{ repo_dir }}"
        state: absent

    - name: Resumo da Execução
      ansible.builtin.debug:
        msg: "✅ Parse e Push concluídos! O arquivo current_settings.yaml no GitHub agora está 100% limpo e pronto para o Restore."
...