---
controller_credentials:
  - name: "Acesso AAP Prod"
    description: "{{ description }}"
    credential_type: "Red Hat Ansible Automation Platform"
    organization: "{{ orgs }}"
    inputs:
      host: "{{ aap_destination_hostname }}"
      password: "{{ aap_destination_password }}"
      username: "{{ aap_destination_username }}"
      verify_ssl: "{{ aap_destination_validate_certs }}"
      oauth_token: "{{ aap_destination_token }}"

