---
ansible-navigator:
  logging:
    append: true
    level: info
    file: logs/ansible-navigator.log
  mode: stdout
  color:
    enable: true

  execution-environment:
    container-engine: podman
    enabled: true
    image: quay.io/lagomes/ee-cac-rhel9:v7
    pull:
      policy: missing

    volume-mounts:
      - src: "/home/lagomes/MEGA/ansible/backup_aap"
        dest: "/tmp/backup_aap"
        options: "Z"

    environment-variables:
      set:
        CONTROLLER_HOST: "https://xxxxxx"
        CONTROLLER_USERNAME: "xxxxxx"
        CONTROLLER_PASSWORD: "xxxxx"
        CONTROLLER_VERIFY_SSL: "xxxxx"

  playbook-artifact:
    enable: true
    replay: artifacts/ansible_artifact.json
    save-as: artifacts/ansible_artifact.jsonl
