---
- name: Migração Granular para o AAP 2.5 (Item a Item)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    backup_dir: "/tmp/backup_aap/export_granular"

    arquivos_importacao:
      - "01_organizations.yml"
      - "02_users.yml"
      - "03_credential_types.yml"
      - "04_execution_environments.yml"
      - "05_teams.yml"
      - "06_credentials.yml"
      - "07_projects.yml"
      - "08_inventories.yml"
      - "09_inventory_sources.yml"
      - "10_notification_templates.yml"
      - "11_applications.yml"
      - "12_job_templates.yml"
      - "13_workflow_job_templates.yml"
      - "14_schedules.yml"

  tasks:
    - name: Validar se a pasta de backup existe
      ansible.builtin.stat:
        path: "{{ backup_dir }}"
      register: dir_check

    - name: Parar se a pasta não for encontrada
      ansible.builtin.fail:
        msg: "A pasta {{ backup_dir }} não foi encontrada! Verifique o mapeamento de volume no navigator."
      when: not dir_check.stat.exists

    - name: Importar os recursos um a um no AAP 2.5
      ansible.controller.import:
        # Lê o arquivo atual do loop e converte o YAML em dicionário para o módulo
        assets: "{{ lookup('file', backup_dir + '/' + item) | from_yaml }}"
      loop: "{{ arquivos_importacao }}"
      register: import_results

    - name: Resumo da Importação
      ansible.builtin.debug:
        msg: "Importação finalizada! Todos os {{ arquivos_importacao | length }} arquivos foram processados."

