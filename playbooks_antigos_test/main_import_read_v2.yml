---
- name: GitOps - Apply Configuration as Code (Dynamic Loader & Dispatch)
  hosts: localhost
  gather_facts: false

  vars:
    # 1. Autenticação do AAP de Destino
    controller_hostname: "{{ lookup('env', 'CONTROLLER_HOST') }}"
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default(omit) }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') | default(omit) }}"
    controller_oauthtoken: "{{ lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default(null) }}"
    controller_validate_certs: false

    # 2. Configurações do Git
    github_token: "{{ github_token }}"
    github_repo_url: "github.com/laurobmb/aap_backup.git"
    github_branch: "aap24-platform-baseline"

    # 3. Diretório temporário
    repo_dir: "/tmp/filetree_input"

  module_defaults:
    ansible.builtin.uri:
      validate_certs: "{{ controller_validate_certs }}"

  pre_tasks:
    - name: Limpar diretório temporário (Idempotência no container)
      ansible.builtin.file:
        path: "{{ repo_dir }}"
        state: absent

    - name: Clonar o repositório do GitHub (Apenas Leitura)
      ansible.builtin.shell: |
        git clone https://{{ github_token }}@{{ github_repo_url }} -b {{ github_branch }} {{ repo_dir }}
      # no_log: true

    - name: Setup authentication (Gerar Token Temporário)
      no_log: "{{ controller_configuration_filetree_create_secure_logging | default('false') }}"
      when: controller_oauthtoken is not defined
      tags:
        - always
      block:
        - name: Get the authentication
          ansible.builtin.uri:
            url: "https://{{ controller_hostname }}/api/v2/tokens/"
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            method: POST
            force_basic_auth: true
            status_code: 201
          register: authtoken_res

        - name: Set the Token Fact
          ansible.builtin.set_fact:
            controller_oauthtoken: "{{ authtoken_res.json.token }}"
            controller_oauthtoken_url: "{{ authtoken_res.json.url }}"

  tasks:
    # =========================================================================
    # CARREGADOR DINÂMICO DE CaC (Substitui o filetree_read)
    # =========================================================================
    - name: Encontrar todos os arquivos YAML do repositório (Escala Infinita)
      ansible.builtin.find:
        paths: "{{ repo_dir }}"
        patterns: "*.yaml,*.yml"
        recurse: true
      register: yaml_files

    - name: Inicializar listas vazias para os recursos do Controller
      ansible.builtin.set_fact:
        controller_settings: []
        controller_organizations: []
        controller_user_accounts: []
        controller_teams: []
        controller_credential_types: []
        controller_credentials: []
        controller_execution_environments: []
        controller_projects: []
        controller_inventories: []
        controller_inventory_sources: []
        controller_instance_groups: []
        controller_hosts: []
        controller_groups: []
        controller_templates: []
        controller_workflows: []
        controller_schedules: []
        controller_roles: []
        controller_applications: []
        controller_labels: []

    - name: Carregar e agregar recursos dinamicamente na memória
      ansible.builtin.set_fact:
        # O 'true' dentro do default garante que se o YAML vier como 'null', ele vira '[]'
        controller_settings: "{{ controller_settings + (file_content.controller_settings | default([], true)) }}"
        controller_organizations: "{{ controller_organizations + (file_content.controller_organizations | default([], true)) }}"
        controller_user_accounts: "{{ controller_user_accounts + (file_content.controller_user_accounts | default([], true)) }}"
        controller_teams: "{{ controller_teams + (file_content.controller_teams | default([], true)) }}"
        controller_credential_types: "{{ controller_credential_types + (file_content.controller_credential_types | default([], true)) }}"
        controller_credentials: "{{ controller_credentials + (file_content.controller_credentials | default([], true)) }}"
        controller_execution_environments: "{{ controller_execution_environments + (file_content.controller_execution_environments | default([], true)) }}"
        controller_projects: "{{ controller_projects + (file_content.controller_projects | default([], true)) }}"
        controller_inventories: "{{ controller_inventories + (file_content.controller_inventories | default([], true)) }}"
        controller_inventory_sources: "{{ controller_inventory_sources + (file_content.controller_inventory_sources | default([], true)) }}"
        controller_instance_groups: "{{ controller_instance_groups + (file_content.controller_instance_groups | default([], true)) }}"
        controller_hosts: "{{ controller_hosts + (file_content.controller_hosts | default([], true)) }}"
        controller_groups: "{{ controller_groups + (file_content.controller_groups | default([], true)) }}"
        controller_templates: "{{ controller_templates + (file_content.controller_templates | default([], true)) }}"
        controller_workflows: "{{ controller_workflows + (file_content.controller_workflows | default([], true)) }}"
        controller_schedules: "{{ controller_schedules + (file_content.controller_schedules | default([], true)) }}"
        controller_roles: "{{ controller_roles + (file_content.controller_roles | default([], true)) }}"
        controller_applications: "{{ controller_applications + (file_content.controller_applications | default([], true)) }}"
        controller_labels: "{{ controller_labels + (file_content.controller_labels | default([], true)) }}"
      vars:
        file_content: "{{ lookup('file', item.path) | regex_replace('!unsafe ', '') | from_yaml | default({}, true) }}"
      loop: "{{ yaml_files.files }}"
      # no_log: true

    # =========================================================================
    # A MÁGICA DE IMPORTAÇÃO
    # =========================================================================
    - name: Acionar o Dispatch para criar tudo no AAP destino
      ansible.builtin.include_role:
        name: infra.controller_configuration.dispatch

  post_tasks:
    - name: Delete Authentication Token
      ansible.builtin.uri:
        url: "https://{{ controller_hostname }}{{ controller_oauthtoken_url }}"
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        method: DELETE
        force_basic_auth: true
        status_code: 204
      when: controller_oauthtoken_url is defined

    - name: Limpar diretório temporário final
      ansible.builtin.file:
        path: "{{ repo_dir }}"
        state: absent

    - name: Resumo da Execução
      ansible.builtin.debug:
        msg: "✅ Restore Inteligente concluído! A infraestrutura inteira foi aplicada no servidor."
...